name: Build APK

# Runs on every push to main branch
# Also has a manual trigger button in GitHub UI
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # ← this adds a "Run workflow" button in GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17 (required for modern Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Cache Gradle dependencies so future builds are faster
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make gradlew executable (in case git didn't preserve permissions)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Download the Gradle wrapper JAR (needed since we don't commit the binary)
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      # 6. Fix SDK env conflict — GitHub runners have both ANDROID_HOME and
      #    ANDROID_SDK_ROOT set. We unset ANDROID_HOME so only ANDROID_SDK_ROOT
      #    is used, which points to the correct SDK location.
      - name: Fix Android SDK environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "local.properties written — SDK conflict resolved."

      # 7. THE BUILD — assembles a debug APK (no signing key needed)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 8. Upload the APK as a downloadable artifact
      #    → Go to Actions tab → click the workflow run → scroll to "Artifacts" → download
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DoomscrollDestroyer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # artifact stays available for 30 days

      # 9. Print APK info to the logs
      - name: APK build info
        run: |
          echo "✅ Build complete!"
          echo "📦 APK location: app/build/outputs/apk/debug/app-debug.apk"
          ls -lh app/build/outputs/apk/debug/
